    body: "{\"max_tokens\":64000,\"messages\":[{\"role\":\"user\",\"content\":\"<response_format>\\\
      n# *XML `edit_block` Response* Rules:\\n\\nUse *XML `edit_block` Response* to\
      \ make precise edits to the repo. Each XML `edit_block` Response specifies:\\\
      n- **What repo file** to modify (with full path)\\n- **What operation** to perform\
      \ (edit, create, delete, replace)\\n- **What content** to find (search section)\\\
      n- **What to replace** it with (replace section)\\n\\n## Response Structure:\\\
      n\\n**REQUIRED**: All responses containing *XML `edit_block` Response* MUST\
      \ start with a PLAN section:\\n\\n- Wrap your plan in `<agent_plan>...</agent_plan>`\
      \ boundaries\\n- Explain what files will be modified and why\\n- List the specific\
      \ changes in numbered steps\\n- Keep it concise but complete\\n\\nExample:\\\
      n<agent_plan><!-- NOTICE: new line here -->\\nTo make this change we need to\
      \ modify `mathweb/flask/app.py` to:\\n\\n1. Import the math package.\\n2. Remove\
      \ the existing factorial() function.\\n3. Update get_factorial() to call math.factorial\
      \ instead.\\n</agent_plan><!-- NOTICE: new line here -->\\n\\n## Operation Types:\\\
      n- `edit` for **editing** existing file content\\n- `create` for **creating**\
      \ new files\\n- `delete` for **deleting** files completely\\n- `replace` for\
      \ **replacing ALL the contents of the file**\\n\\n## *XML `edit_block` Response*\
      \ Format:\\n\\n**For `edit` operations** (modifying existing content):\\n```language\\\
      n<edit_block path=\\\"full/file/path\\\" operation=\\\"edit\\\" block_id=\\\"\
      1\\\">\\n<search>\\n<!-- - Exact character for character content to find\\n-\
      \ **Whitespace matters**: Indentation, spaces, tabs, and newlines must match\
      \ EXACTLY\\n- Copy the content directly from the file - do not reformat or adjust\
      \ spacing\\n- Include all comments, docstrings, whitespace, etc.\\n- If file\
      \ contains wrapped/escaped content, match the literal file contents\\n- REMEMBER:\
      \ Must EXACTLY MATCH existing file content, character for character -->\\n</search>\\\
      n<replace>\\n<!-- - New content to replace the search content with -->\\n</replace>\\\
      n</edit_block>\\n```\\n\\n**For `create`, `delete`, and `replace` operations:**\\\
      n```language\\n<edit_block path=\\\"full/file/path\\\" operation=\\\"`create`,\
      \ `delete`, or `replace`\\\" block_id=\\\"1\\\">\\n<!-- - File content (empty\
      \ for `delete`) -->\\n</edit_block>\\n```\\n\\n## Examples:\\n\\n**Create a\
      \ new file:**\\n```python\\n<edit_block path=\\\"mathweb/flask/app.py\\\" operation=\\\
      \"create\\\" block_id=\\\"1\\\">\\nimport math\\nfrom flask import Flask\\n</edit_block>\\\
      n```\\n\\n**Edit existing file content:**\\n```python\\n<edit_block path=\\\"\
      mathweb/flask/app.py\\\" operation=\\\"edit\\\" block_id=\\\"1\\\">\\n<search>\\\
      nfrom flask import Flask\\n</search>\\n<replace>\\nimport math\\nfrom flask\
      \ import Flask\\n</replace>\\n</edit_block>\\n```\\n\\n**Delete file:**\\n```python\\\
      n<edit_block path=\\\"old_config.py\\\" operation=\\\"delete\\\" block_id=\\\
      \"1\\\">\\n</edit_block>\\n```\\n\\n**Replace all file contents:**\\n```python\\\
      n<edit_block path=\\\"config.py\\\" operation=\\\"replace\\\" block_id=\\\"\
      1\\\">\\nimport os\\nfrom dataclasses import dataclass\\n\\n@dataclass\\nclass\
      \ AppConfig:\\n    debug: bool = False\\n    port: int = 8000\\n    database_url:\
      \ str = os.getenv(\\\"DATABASE_URL\\\", \\\"sqlite:///app.db\\\")\\n</edit_block>\\\
      n```\\n\\n## **CRITICAL RULES:**\\nFile Paths:\\n- Use the FULL file path exactly\
      \ as shown by the user\\n- No bold asterisks, quotes, or escaping around the\
      \ path\\n\\nBlock Strategy:\\n- Use multiple blocks for multiple changes to\
      \ the same file\\n- Include enough context lines to make each search unique\\\
      n- Only replace the first occurrence found\\n\\nFile Operations:\\n- Only edit\
      \ files that the user has added to the chat. Refer to `<context type=\\\"editable\
      \ files\\\">`\\n- For new files: use operation=\\\"create\\\" with empty search,\
      \ content in replace\\n- To move code: use 2 XML `edit_block` Response (1 to\
      \ delete, 1 to insert)\\n\\nUser Intent:\\n- If user says \\\"ok\\\", \\\"go\
      \ ahead\\\", or \\\"do that\\\" \u2192 provide XML `edit_block` Response\\n-\
      \ Wait for user confirmation before assuming edits are applied\\n- ONLY EVER\
      \ RETURN CODE IN A XML `edit_block` Response!\\n\\n</response_format>\\n<user_input>\\\
      nBefore we start lets first practice the *XML `edit_block` Response* Block format.\\\
      n\\nChange get_factorial() to use math.factorial\\n</user_input>\"},{\"role\"\
      :\"assistant\",\"content\":\"<agent_plan>\\nTo make this change we need to modify\
      \ `mathweb/flask/app.py` to:\\n\\n1. Import the math package.\\n2. Remove the\
