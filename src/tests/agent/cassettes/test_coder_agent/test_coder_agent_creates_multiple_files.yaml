    body: "{\"max_tokens\":64000,\"messages\":[{\"role\":\"user\",\"content\":\"<response_format>\\\
      n# *XML `edit_block` Response* Rules:\\n\\nUse *XML `edit_block` Response* to\
      \ make precise edits to the repo. Each XML `edit_block` Response specifies:\\\
      n- **What repo file** to modify (with full path)\\n- **What operation** to perform\
      \ (edit, create, delete, replace)\\n- **What content** to find (search section)\\\
      n- **What to replace** it with (replace section)\\n\\n## Response Structure:\\\
      n\\n**REQUIRED**: All responses containing *XML `edit_block` Response* MUST\
      \ start with a PLAN section:\\n\\n- Wrap your plan in `<agent_plan>...</agent_plan>`\
      \ boundaries\\n- Explain what files will be modified and why\\n- List the specific\
      \ changes in numbered steps\\n- Keep it concise but complete\\n\\nExample:\\\
      n<agent_plan><notice>new line here</notice>\\nTo make this change we need to\
      \ modify `mathweb/flask/app.py` to:\\n\\n1. Import the math package.\\n2. Remove\
      \ the existing factorial() function.\\n3. Update get_factorial() to call math.factorial\
      \ instead.\\n</agent_plan><notice>new line here</notice>\\n\\n## *XML `edit_block`\
      \ Response* Format:\\n\\nEvery *XML `edit_block` Response* must use this exact\
      \ format:\\n```language\\n<edit_block path=\\\"full/file/path\\\" operation=\\\
      \"operation_type\\\" block_id=\\\"1\\\">\\n<search><notice>new line here</notice>\\\
      n[exact charector for charector content to find<notice>(including comments and\
      \ ai messages, can be empty)</notice>\\n</search>\\n<replace><notice>new line\
      \ here</notice>\\n[content to replace with]<notice>(can be empty)</notice>\\\
      n</replace>\\n</edit_block>\\n```\\n**IMPORTANT**: Never put content on the\
      \ same line as the opening tag.\\n\\n## Operation Types:\\n- `edit` for **editing**\
      \ existing file content\\n- `create` for **creating** new files\\n- `delete`\
      \ for **removing** files completely\\n- `replace` for **replacing entire file\
      \ contents**\\n\\n## Examples:\\n\\n**Create a new file:**\\n```python\\n<edit_block\
      \ path=\\\"mathweb/flask/app.py\\\" operation=\\\"create\\\" block_id=\\\"1\\\
      \">\\n<search>\\n</search>\\n<replace>\\nimport math\\nfrom flask import Flask\\\
      n</replace>\\n</edit_block>\\n```\\n\\n**Edit existing file content:**\\n```python\\\
      n<edit_block path=\\\"mathweb/flask/app.py\\\" operation=\\\"edit\\\" block_id=\\\
      \"1\\\">\\n<search>\\nfrom flask import Flask\\n</search>\\n<replace>\\nimport\
      \ math\\nfrom flask import Flask\\n</replace>\\n</edit_block>\\n```\\n\\n**Remove\
      \ entire file:**\\n```python\\n<edit_block path=\\\"old_config.py\\\" operation=\\\
      \"delete\\\" block_id=\\\"1\\\">\\n<search>\\n</search>\\n<replace>\\n</replace>\\\
      n</edit_block>\\n```\\n\\n**Replace all file contents:**\\n```python\\n<edit_block\
      \ path=\\\"config.py\\\" operation=\\\"replace\\\" block_id=\\\"1\\\">\\n<search>\\\
      n</search>\\n<replace>\\nimport os\\nfrom dataclasses import dataclass\\n\\\
      n@dataclass\\nclass AppConfig:\\n    debug: bool = False\\n    port: int = 8000\\\
      n    database_url: str = os.getenv(\\\"DATABASE_URL\\\", \\\"sqlite:///app.db\\\
      \")\\n</replace>\\n</edit_block>\\n```\\n\\n## **CRITICAL RULES:**\\nFile Paths:\\\
      n- Use the FULL file path exactly as shown by the user\\n- No bold asterisks,\
      \ quotes, or escaping around the path\\n\\nSearch Content:\\n- Must EXACTLY\
      \ MATCH existing file content, character for character\\n- Include all comments,\
      \ docstrings, whitespace, etc.\\n- If file contains wrapped/escaped content,\
      \ match the literal file contents\\n\\nBlock Strategy:\\n- Use multiple blocks\
      \ for multiple changes to the same file\\n- Include enough context lines to\
      \ make each search unique\\n- Only replace the first occurrence found\\n\\nFile\
      \ Operations:\\n- Only edit files that the user has added to the chat. Refer\
      \ to `<context type=\\\"editable files\\\">`\\n- For new files: use operation=\\\
      \"create\\\" with empty search, content in replace\\n- To move code: use 2 XML\
      \ `edit_block` Response (1 to delete, 1 to insert)\\n\\nUser Intent:\\n- If\
      \ user says \\\"ok\\\", \\\"go ahead\\\", or \\\"do that\\\" \u2192 provide\
      \ XML `edit_block` Response\\n- Wait for user confirmation before assuming edits\
      \ are applied\\n- ONLY EVER RETURN CODE IN A XML `edit_block` Response!\\n\\\
      n</response_format>\\n<user_input>\\nBefore we start lets first practice the\
      \ *XML `edit_block` Response* Block format.\\n\\nChange get_factorial() to use\
      \ math.factorial\\n</user_input>\"},{\"role\":\"assistant\",\"content\":\"<agent_plan>\\\
      nTo make this change we need to modify `mathweb/flask/app.py` to:\\n\\n1. Import\
      \ the math package.\\n2. Remove the existing factorial() function.\\n3. Update\
      \ get_factorial() to call math.factorial instead.\\n</agent_plan>\\n\\n```python\\\
      n<edit_block path=\\\"mathweb/flask/app.py\\\" operation=\\\"edit\\\" block_id=\\\
      \"1\\\">\\n<search>\\nfrom flask import Flask\\n</search>\\n<replace>\\nimport\
      \ math\\nfrom flask import Flask\\n</replace>\\n</edit_block>\\n```\\n\\n```python\\\
      n<edit_block path=\\\"mathweb/flask/app.py\\\" operation=\\\"edit\\\" block_id=\\\
      \"2\\\">\\n<search>\\ndef factorial(n):\\n    \\\"compute factorial\\\"\\n\\\
      n    if n == 0:\\n        return 1\\n    else:\\n        return n * factorial(n-1)\\\
      n</search>\\n<replace>\\n</replace>\\n</edit_block>\\n```\\n\\n```python\\n<edit_block\
      \ path=\\\"mathweb/flask/app.py\\\" operation=\\\"edit\\\" block_id=\\\"3\\\"\
      >\\n<search>\\n    return str(factorial(n))\\n</search>\\n<replace>\\n    return\
      \ str(math.factorial(n))\\n</replace>\\n</edit_block>\\n```\"},{\"role\":\"\
      user\",\"content\":\"Refactor hello() into its own file.\"},{\"role\":\"assistant\"\
      ,\"content\":\"<agent_plan>\\nTo make this change we need to modify `main.py`\
      \ and make a new file `hello.py`:\\n\\n1. Make a new hello.py file with hello()\
      \ in it.\\n2. Remove hello() from main.py and replace it with an import.\\n</agent_plan>\\\
      n\\n```python\\n<edit_block path=\\\"hello.py\\\" operation=\\\"create\\\" block_id=\\\
      \"1\\\">\\n<search>\\n</search>\\n<replace>\\ndef hello():\\n    \\\"print a\
      \ greeting\\\"\\n\\n    print(\\\"hello\\\")\\n</replace>\\n</edit_block>\\\
      n```\\n\\n```python\\n<edit_block path=\\\"main.py\\\" operation=\\\"edit\\\"\
      \ block_id=\\\"2\\\">\\n<search>\\ndef hello():\\n    \\\"print a greeting\\\
      \"\\n\\n    print(\\\"hello\\\")\\n</search>\\n<replace>\\nfrom hello import\
      \ hello\\n</replace>\\n</edit_block>\\n```\"},{\"role\":\"user\",\"content\"\
      :\"Remove the old_config.py file that's no longer needed.\"},{\"role\":\"assistant\"\
      ,\"content\":\"<agent_plan>\\nTo remove this file we need to delete `old_config.py`:\\\
      n\\n1. Remove the old_config.py file completely from the project.\\n</agent_plan>\\\
      n\\n```python\\n<edit_block path=\\\"old_config.py\\\" operation=\\\"delete\\\
      \" block_id=\\\"1\\\">\\n<search>\\n</search>\\n<replace>\\n</replace>\\n</edit_block>\\\
      n```\"},{\"role\":\"user\",\"content\":\"Replace all the contents of config.py\
      \ with a new configuration structure.\"},{\"role\":\"assistant\",\"content\"\
      :\"<agent_plan>\\nTo replace all the contents we need to completely rewrite\
      \ `config.py`:\\n\\n1. Replace the entire contents of config.py with the new\
      \ configuration structure.\\n</agent_plan>\\n\\n```python\\n<edit_block path=\\\
      \"config.py\\\" operation=\\\"replace\\\" block_id=\\\"1\\\">\\n<search>\\n</search>\\\
      n<replace>\\nimport os\\nfrom dataclasses import dataclass\\n\\n@dataclass\\\
      nclass AppConfig:\\n    debug: bool = False\\n    port: int = 8000\\n    database_url:\
      \ str = os.getenv(\\\"DATABASE_URL\\\", \\\"sqlite:///app.db\\\")\\n</replace>\\\
      n</edit_block>\\n```\"},{\"role\":\"user\",\"content\":\"Add error handling\
      \ to the calculator function and update the docstring.\"},{\"role\":\"assistant\"\
      ,\"content\":\"<agent_plan>\\nTo add error handling we need to modify `calculator.py`\
      \ in two places:\\n\\n1. Update the docstring to mention error handling.\\n2.\
      \ Add try-catch block around the calculation.\\n</agent_plan>\\n\\n```python\\\
      n<edit_block path=\\\"calculator.py\\\" operation=\\\"edit\\\" block_id=\\\"\
      1\\\">\\n<search>\\ndef calculate(a, b):\\n    \\\"Simple calculator function\\\
      \"\\n</search>\\n<replace>\\ndef calculate(a, b):\\n    \\\"Simple calculator\
      \ function with error handling\\\"\\n</replace>\\n</edit_block>\\n```\\n\\n```python\\\
      n<edit_block path=\\\"calculator.py\\\" operation=\\\"edit\\\" block_id=\\\"\
      2\\\">\\n<search>\\n    return a / b\\n</search>\\n<replace>\\n    try:\\n \
      \       return a / b\\n    except ZeroDivisionError:\\n        return \\\"Error:\
      \ Cannot divide by zero\\\"\\n</replace>\\n</edit_block>\\n```\"},{\"role\"\
      :\"user\",\"content\":\"<conversation_history>\\n<heading>\\nBelow is the conversation\
      \ history between Byte agents and the user.\\n<heading>\\nThe conversation history\
      \ is empty.\\n</conversation_history>\\n<user_input>\\n```text\\nCreate two\
      \ files: utils.py with a helper function and config.py with a settings dictionary\\\
      n```\\n\\nYou **MUST** consider the user input before proceeding (if not empty).\\\
      n</user_input>\\n<operating_constraints>\\n- Always use best practices when\
      \ coding\\n- Respect and use existing conventions, libraries, etc that are already\
      \ present in the code base\\n- Take requests for changes to the supplied code\\\
      n- If the request is ambiguous, ask clarifying questions before proceeding\\\
      n- Keep changes simple don't build more then what is asked for\\n</operating_constraints>\\\
      n\\n\\n\\n\\n<operating_principles>\\n<notice>You **MUST** follow these Operating\
      \ Principles</notice>\\n<search> Tag Rules:\\n- Never put content on the same\
      \ line as the opening tag.\\n- Must EXACTLY MATCH existing file content, character\
