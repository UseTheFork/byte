      \ format:\\n```language\\n<edit_block path=\\\"full/file/path\\\" operation=\\\
      \"operation_type\\\" block_id=\\\"1\\\">\\n<search>\\n<!-- - Exact charector\
      \ for charector content to find including comments and ai messages\\n- **Whitespace\
      \ matters**: Indentation, spaces, tabs, and newlines must match EXACTLY\\n-\
      \ Copy the content directly from the file - do not reformat or adjust spacing\\\
      n- MUST be empty for `create`, `delete`, and `replace` operations -->\\n</search>\\\
      n<replace>\\n<!-- - Content to replace with goes here\\n- MUST be empty for\
      \ `delete` operations -->\\n</replace>\\n</edit_block>\\n```\\n\\n## Operation\
      \ Types:\\n- `edit` for **editing** existing file content\\n- `create` for **creating**\
      \ new files\\n- `delete` for **deleting** files completely\\n- `replace` for\
      \ **replacing ALL the contents of the file**\\n\\n## Examples:\\n\\n**Create\
      \ a new file:**\\n```python\\n<edit_block path=\\\"mathweb/flask/app.py\\\"\
      \ operation=\\\"create\\\" block_id=\\\"1\\\">\\n<search>\\n</search>\\n<replace>\\\
      nimport math\\nfrom flask import Flask\\n</replace>\\n</edit_block>\\n```\\\
      n\\n**Edit existing file content:**\\n```python\\n<edit_block path=\\\"mathweb/flask/app.py\\\
      \" operation=\\\"edit\\\" block_id=\\\"1\\\">\\n<search>\\nfrom flask import\
      \ Flask\\n</search>\\n<replace>\\nimport math\\nfrom flask import Flask\\n</replace>\\\
      n</edit_block>\\n```\\n\\n**Delete file:**\\n```python\\n<edit_block path=\\\
      \"old_config.py\\\" operation=\\\"delete\\\" block_id=\\\"1\\\">\\n<search>\\\
      n</search>\\n<replace>\\n</replace>\\n</edit_block>\\n```\\n\\n**Replace all\
      \ file contents:**\\n```python\\n<edit_block path=\\\"config.py\\\" operation=\\\
      \"replace\\\" block_id=\\\"1\\\">\\n<search>\\n</search>\\n<replace>\\nimport\
      \ os\\nfrom dataclasses import dataclass\\n\\n@dataclass\\nclass AppConfig:\\\
      n    debug: bool = False\\n    port: int = 8000\\n    database_url: str = os.getenv(\\\
      \"DATABASE_URL\\\", \\\"sqlite:///app.db\\\")\\n</replace>\\n</edit_block>\\\
      n```\\n\\n## **CRITICAL RULES:**\\nFile Paths:\\n- Use the FULL file path exactly\
