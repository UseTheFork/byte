      \ user input before proceeding (if not empty).\\n</user_input>\\n\\n<task>\\\
      nYou will be provided with code files and a focus area for the convention.\\\
      nYour task is to analyze the code and create a convention document that captures:\\\
      n- Key patterns and practices used in the codebase\\n- Naming conventions and\
      \ code structure\\n- Important design decisions and rationale\\n- Specific examples\
      \ from the provided code\\n\\n- **Concise is key**: The context window is a\
      \ public good. Conventions are always loaded by AI agents, so every token counts.\\\
      nConventions are single Markdown files (not multi-file packages). They do not\
      \ include scripts, assets, or separate reference files.\\n</task>\\n\\n<operating_constraints>\\\
      n- Combine turns whenever possible by utilizing parallel searching and reading\
      \ and by requesting enough context, to enable you to skip using an extra turn\
      \ reading the file.\\n- Byte is already very smart. Only add context Byte doesn't\
      \ already have.\\n- Challenge each piece of information: 'Does Byte really need\
      \ this explanation?' and 'Does this paragraph justify its token cost?'\\n- Prefer\
      \ concise examples over verbose explanations\\n- Use concrete examples from\
      \ the provided code\\n- Focus only on the requested aspect (e.g., \\\"Python\
      \ style\\\", \\\"API design\\\", \\\"error handling\\\")\\n- Use bullet points\
      \ and clear headings for scannability\\n- Include \\\"why\\\" behind conventions\
      \ when it's not obvious\\n- Avoid generic advice - be specific to this codebase\\\
      n- Format code examples with proper syntax highlighting\\n</operating_constraints>\\\
      n\\n<response_requirements>\\nYou MUST follow the exact template structure provided\
      \ below.\\nThis template is REQUIRED and must be followed precisely.\\nDo not\
      \ deviate from this structure.\\n</response_requirements>\\n<response_template>\\\
      n<!-- **IMPORTANT: You MUST follow the below template to be successful.** -->\\\
      n```text\\n---\\nname: template-convention\\ndescription: Replace with description\
      \ of the convention and when Byte should use it.\\n---\\n\\n# Insert instructions\
      \ below\\n```\\n</response_template>\\n<goal>\\nCreate a convention file that\
      \ AI agents can quickly reference to maintain consistency\\nwith the existing\
      \ codebase patterns and practices.\\n</goal>\\n\\n<project_hierarchy>\\nProject\
      \ Structure:\\n\u251C\u2500\u2500 .gitignore\\n\u251C\u2500\u2500 README.md\\\
      n\u251C\u2500\u2500 example.js\\n\u2514\u2500\u2500 example.py\\n</project_hierarchy>\\\
      n# Here are the files in the current context:\\n\\n<!-- NOTICE: Trust the bellow\
      \ as the true contents of these files! -->\\nAny other messages may contain\
      \ outdated versions of the files' contents.\\n<context type=\\\"read only files\\\
      \">\\n<!-- NOTICE: Any edits to these files will be rejected -->\\n<file source=\\\
      \"example.js\\\" language=\\\"javascript\\\" mode=\\\"read-only\\\">\\n   0\
      \ | // This is a single-line comment\\n   1 | function greet(name) {\\n   2\
      \ | /* This is a\\n   3 |     multi-line comment */\\n   4 | return `Hello,\
      \ ${name}`;\\n   5 | }\\n</file>\\n<file source=\\\"example.py\\\" language=\\\
      \"python\\\" mode=\\\"read-only\\\">\\n   0 | def calculate(a, b):\\n   1 |\
      \ # This is a comment\\n   2 | return a + b\\n   3 | \\n   4 | class MyClass:\\\
      n   5 | '''This is a docstring'''\\n   6 | pass\\n</file>\\n</context>\\n\\\
      n<operating_principles>\\n<!-- NOTICE: You **MUST** follow these Operating Principles\
      \ -->\\nExecute multiple independent tool calls in parallel when feasible (i.e.\
      \ searching the codebase).\\n</operating_principles>\"}],\"model\":\"claude-sonnet-4-5\"\
      ,\"stream\":true,\"system\":\"<role>\\nYou are Byte, a CLI agent specializing\
      \ in software engineering tasks. Your primary goal is to help users safely and\
      \ effectively.\\nAct as an expert technical writer specializing in creating\
      \ concise, actionable coding conventions.\\n</role>\",\"temperature\":0.1,\"\
      tools\":[{\"name\":\"read_files\",\"input_schema\":{\"properties\":{\"file_paths\"\
      :{\"description\":\"MUST BE A LIST, of file paths to read (relative to the project\
      \ root)\",\"items\":{\"type\":\"string\"},\"type\":\"array\"}},\"required\"\
